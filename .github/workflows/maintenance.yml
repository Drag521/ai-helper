name: "Maintenance"

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Check for updates
        id: updates
        run: |
          pnpm install --frozen-lockfile
          pnpm outdated || echo "All dependencies up to date"

      - name: Create PR for dependency updates
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Dependency update check completed')
            console.log('Manual updates available via: pnpm update')

  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const now = new Date();
            let deleted = 0;
            
            for (const artifact of artifacts.data.artifacts) {
              const created = new Date(artifact.created_at);
              const age = (now - created) / (1000 * 60 * 60 * 24); // days
              
              // Delete artifacts older than 7 days (adjust as needed)
              if (age > 7) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                deleted++;
              }
            }
            
            console.log(`Deleted ${deleted} old artifacts`);

  health-check:
    name: Repository Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify build
        run: pnpm build 2>&1 | tail -20

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint check
        run: pnpm lint

      - name: Test count
        run: |
          echo "Test files found:"
          find tests -name "*.spec.ts" -o -name "*.test.ts" | wc -l

      - name: Create issue if unhealthy
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Repository Health Check Failed',
              body: 'Automated health check failed. Please review: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['maintenance', 'automated'],
            });

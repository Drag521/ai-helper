name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Deploy
        run: |
          echo "Add your deployment logic here (e.g., rsync, Vercel CLI, Docker push, etc.)"
          # Example: pnpm deploy:prod or custom script

name: 'Setup Node + pnpm'
description: 'Consistent Node 24 + pnpm setup'

inputs:
  cache:
    description: 'Enable cache'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'pnpm'

    - name: Enable pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm --version

    - name: Install deps
      if: ${{ inputs.cache == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile

name: "Setup Node + pnpm"
description: "Consistent Node + pnpm setup for all workflows"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Install pnpm (via npm) and verify
      shell: bash
      run: |
        set -euxo pipefail
        npm --version
        node --version
        npm i -g pnpm@9
        which pnpm
        pnpm --version

    - name: Install dependencies (frozen lockfile)
      shell: bash
      run: pnpm install --frozen-lockfile

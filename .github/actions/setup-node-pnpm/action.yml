name: "Setup Node + pnpm"
description: "Consistent Node 24 + pnpm setup for all workflows"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Install pnpm with corepack (and verify)
      shell: bash
      run: |
        set -euxo pipefail
        corepack --version || true
        corepack enable
        corepack prepare pnpm@9.15.4 --activate
        which pnpm || true
        pnpm --version

    - name: Install dependencies (frozen lockfile)
      shell: bash
      run: pnpm install --frozen-lockfile

name: "Setup Node + pnpm"
description: "Consistent Node 24 + pnpm setup for all workflows"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Ensure pnpm is available (fix PATH explicitly)
      shell: bash
      run: |
        set -euxo pipefail
        export PNPM_PATH="$HOME/.config/nvm/versions/node/v24.18.0/bin"
        export PATH="$PNPM_PATH:$PATH"

        echo "PATH=$PATH"
        ls -la "$PNPM_PATH" | grep pnpm || true
        command -v pnpm || true
        pnpm --version

    - name: Install dependencies (frozen lockfile)
      shell: bash
      run: pnpm install --frozen-lockfile

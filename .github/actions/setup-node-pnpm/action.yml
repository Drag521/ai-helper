name: "Setup Node + pnpm"
description: "Consistent Node + pnpm setup for all workflows"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Ensure pnpm is available
      shell: bash
      run: |
        set -euxo pipefail
        export PNPM_PATH="$HOME/.config/nvm/versions/node/$(node -p 'process.versions.node').*/bin"
        # fallback to the known location
        export PATH="$HOME/.config/nvm/versions/node/v24.18.0/bin:$PATH"
        echo "PATH=$PATH"
        command -v pnpm
        pnpm --version

    - name: Install dependencies (frozen lockfile)
      shell: bash
      run: |
        set -euxo pipefail
        export PATH="$(dirname "$(command -v pnpm)"):$PATH"
        pnpm install --frozen-lockfile


name: "Setup Node + pnpm"
description: "Consistent Node 24 + pnpm setup for all workflows"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Enable pnpm (corepack) and verify
      shell: bash
      run: |
        set -euxo pipefail
        corepack --version || true
        corepack enable || true

        # Use an explicit pnpm version for stability
        corepack prepare pnpm@9.15.4 --activate

        # Ensure pnpm is callable (fix PATH to wherever corepack put it)
        if ! command -v pnpm >/dev/null 2>&1; then
          echo "pnpm not found in current PATH, attempting to locate it..."
          PNPM_BIN="$(find "$(dirname "$(command -v node)")" -maxdepth 4 -type f -name pnpm -print 2>/dev/null | head -n 1 || true)"
          if [ -n "$PNPM_BIN" ]; then
            export PATH="$(dirname "$PNPM_BIN"):$PATH"
          fi
        fi

        command -v pnpm
        pnpm --version

    - name: Install dependencies (frozen lockfile)
      shell: bash
      run: |
        set -euxo pipefail
        pnpm install --frozen-lockfile

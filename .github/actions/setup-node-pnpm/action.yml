name: "Setup Node + pnpm"
description: "Consistent Node 24 + pnpm setup for all workflows"

inputs:
  cache:
    description: "Enable dependency cache"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9


    - name: Install dependencies (frozen lockfile)
      shell: bash
      run: pnpm install --frozen-lockfile

